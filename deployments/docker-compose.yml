services:
  app:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: crypto-watchtower-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CONFIG_PATH: /app/configs/config.example.yaml
      CW_POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/crypto_watchtower?sslmode=disable
      CW_REDIS_ADDR: redis:6379
      CW_TELEGRAM_BOT_TOKEN: YOUR_BOT_TOKEN
      CW_TELEGRAM_DEFAULT_CHAT_ID: YOUR_CHAT_ID
      CW_API_BEARER_TOKEN: change-me
    ports:
      - "${APP_HTTP_PORT:-8080}:8080"

  postgres:
    image: postgres:16
    container_name: crypto-watchtower-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crypto_watchtower
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crypto_watchtower"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: crypto-watchtower-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
